name: Publicar painel no GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar os arquivos do repositorio
        uses: actions/checkout@v6

      - name: Preparar os arquivos publicados
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/

          RELEASE="$(tr -d '[:space:]' < VERSION)"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cat > _site/version.json <<EOF
          {
            "release": "${RELEASE}",
            "build": "${GITHUB_RUN_NUMBER}",
            "commit": "${SHORT_SHA}",
            "builtAt": "${BUILT_AT}"
          }
          EOF

          touch _site/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar arquivos para publicacao
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
